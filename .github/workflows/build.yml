name: Build LLVM Releases

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LLVM_LINKAGE: Static
  LLVM_WINDOWS_MSVC_RUNTIME: MT
  LLVM_MACOS_DEPLOYMENT_TARGET: "11.0"

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish archives to a GitHub release"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "llvm-*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            runner: windows-2022
            platform: windows
            arch: x64
          - name: linux-x64
            runner: ubuntu-22.04
            platform: linux
            arch: x64
          - name: macos-arm64
            runner: macos-14
            platform: macos
            arch: arm64

    steps:
      - name: Checkout bootstrap repo
        uses: actions/checkout@v5

      - name: Read LLVM version
        id: version
        shell: bash
        run: |
          llvm_ref="$(tr -d '\r\n' < llvm.version)"
          if [[ -z "$llvm_ref" ]]; then
            echo "llvm.version is empty" >&2
            exit 1
          fi
          if [[ "$llvm_ref" == llvmorg-* ]]; then
            version="${llvm_ref#llvmorg-}"
          else
            version="$llvm_ref"
          fi
          release_tag="llvm-$version"
          echo "llvm_ref=$llvm_ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Checkout llvm-project
        uses: actions/checkout@v5
        with:
          repository: llvm/llvm-project
          ref: ${{ steps.version.outputs.llvm_ref }}
          path: llvm-project
          fetch-depth: 1

      - name: Set up MSVC developer command prompt
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build LLVM on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./build.ps1 `
            -LlvmRef "${{ steps.version.outputs.llvm_ref }}" `
            -SourceDir "$PWD/llvm-project" `
            -BuildDir "$PWD/build" `
            -InstallDir "$PWD/install" `
            -Linkage "${{ env.LLVM_LINKAGE }}" `
            -MsvcRuntime "${{ env.LLVM_WINDOWS_MSVC_RUNTIME }}"

      - name: Build LLVM on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x ./build.sh
          ./build.sh \
            "${{ steps.version.outputs.llvm_ref }}" \
            "$PWD/llvm-project" \
            "$PWD/build" \
            "$PWD/install" \
            "${{ env.LLVM_LINKAGE }}" \
            "${{ env.LLVM_MACOS_DEPLOYMENT_TARGET }}"

      - name: Package on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./package.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -Platform "${{ matrix.platform }}" `
            -Architecture "${{ matrix.arch }}" `
            -InstallDir "$PWD/install" `
            -OutputDir "$PWD/artifacts" `
            -Linkage "${{ env.LLVM_LINKAGE }}" `
            -MsvcRuntime "${{ env.LLVM_WINDOWS_MSVC_RUNTIME }}" `
            -LlvmRef "${{ steps.version.outputs.llvm_ref }}"

      - name: Package on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x ./package.sh
          ./package.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ matrix.platform }}" \
            "${{ matrix.arch }}" \
            "$PWD/install" \
            "$PWD/artifacts" \
            "${{ env.LLVM_LINKAGE }}" \
            "${{ steps.version.outputs.llvm_ref }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: llvm-${{ matrix.platform }}-${{ matrix.arch }}
          path: artifacts/*

  release:
    name: Publish Release
    if: ${{ github.event_name == 'push' || inputs.publish_release }}
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout bootstrap repo
        uses: actions/checkout@v5

      - name: Read LLVM version
        id: version
        shell: bash
        run: |
          llvm_ref="$(tr -d '\r\n' < llvm.version)"
          if [[ "$llvm_ref" == llvmorg-* ]]; then
            version="${llvm_ref#llvmorg-}"
          else
            version="$llvm_ref"
          fi
          release_tag="llvm-$version"
          echo "llvm_ref=$llvm_ref" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag matches llvm.version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          pushed_tag="${GITHUB_REF_NAME}"
          expected_tag="${{ steps.version.outputs.release_tag }}"
          if [[ "$pushed_tag" != "$expected_tag" ]]; then
            echo "pushed tag '$pushed_tag' does not match expected tag '$expected_tag' from llvm.version" >&2
            exit 1
          fi

      - name: Download all build artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          find dist -type f \( -name '*.tar.xz' -o -name '*.zip' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > dist/SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: LLVM ${{ steps.version.outputs.version }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/**/*.tar.xz
            dist/**/*.zip
            dist/SHA256SUMS.txt
